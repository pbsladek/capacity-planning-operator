---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: capacityplannotifications.capacityplanning.pbsladek.io
spec:
  group: capacityplanning.pbsladek.io
  names:
    kind: CapacityPlanNotification
    listKind: CapacityPlanNotificationList
    plural: capacityplannotifications
    shortNames:
    - cpn
    singular: capacityplannotification
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.planRefName
      name: Plan
      type: string
    - jsonPath: .status.lastSentTime
      name: Last Sent
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: CapacityPlanNotification routes CapacityPlan risk digests to
          external channels.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CapacityPlanNotificationSpec defines notification routing
              for a CapacityPlan digest.
            properties:
              cooldown:
                default: 30m
                description: Cooldown is the minimum time between notifications. Defaults
                  to 30m.
                type: string
              dryRun:
                default: false
                description: |-
                  DryRun computes and logs notifications without sending external traffic.
                  Defaults to false.
                type: boolean
              email:
                description: Email channel configuration.
                properties:
                  enabled:
                    description: Enabled toggles email delivery.
                    type: boolean
                  from:
                    description: From is the sender address.
                    type: string
                  smtpHostKey:
                    default: host
                    description: SMTPHostKey defaults to "host".
                    type: string
                  smtpPasswordKey:
                    default: password
                    description: SMTPPasswordKey defaults to "password".
                    type: string
                  smtpPortKey:
                    default: port
                    description: SMTPPortKey defaults to "port".
                    type: string
                  smtpSecretRefName:
                    description: |-
                      SMTPSecretRefName is a Secret in the same namespace containing SMTP credentials.
                      expected keys by default: host, port, username, password.
                    type: string
                  smtpUsernameKey:
                    default: username
                    description: SMTPUsernameKey defaults to "username".
                    type: string
                  subjectPrefix:
                    description: SubjectPrefix is prepended to the email subject.
                    type: string
                  to:
                    description: To is the list of recipient addresses.
                    items:
                      type: string
                    type: array
                type: object
              onChangeOnly:
                default: true
                description: |-
                  OnChangeOnly sends notifications only when risk snapshot hash changes.
                  Defaults to true.
                type: boolean
              planRefName:
                description: PlanRefName is the CapacityPlan name to monitor.
                type: string
              slack:
                description: Slack channel configuration.
                properties:
                  enabled:
                    description: Enabled toggles Slack delivery.
                    type: boolean
                  webhookSecretKey:
                    default: webhookURL
                    description: WebhookSecretKey is the key in WebhookSecretRefName.
                      Defaults to webhookURL.
                    type: string
                  webhookSecretRefName:
                    description: WebhookSecretRefName is a Secret in the same namespace
                      containing webhook URL.
                    type: string
                type: object
            required:
            - planRefName
            type: object
          status:
            description: CapacityPlanNotificationStatus defines observed notification
              state.
            properties:
              conditions:
                description: Conditions describe latest delivery state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastDigestHash:
                description: LastDigestHash is the risk snapshot hash used for the
                  last send.
                type: string
              lastMessage:
                description: LastMessage is a short summary of the last delivery operation.
                type: string
              lastSentChannels:
                description: LastSentChannels reports which channels were used for
                  the last send.
                items:
                  type: string
                type: array
              lastSentTime:
                description: LastSentTime is when a notification was last sent (or
                  dry-run emitted).
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
