apiVersion: capacityplanning.pbsladek.io/v1
kind: CapacityPlan
metadata:
  name: cluster
spec:
  # Watch all namespaces. Restrict with:
  #   namespaces: ["default", "production"]
  namespaces: []

  # Keep 720 hourly samples per PVC (30 days at 1h scrape interval).
  sampleRetention: 720

  # How often the CapacityPlan reconciler runs to compute growth and update status.
  reconcileInterval: "1h"

  # Base URL of the Prometheus instance that exposes kubelet_volume_stats_* metrics.
  # Required for live usage collection; leave empty to disable Prometheus scraping.
  prometheusURL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

  # Alert thresholds.
  thresholds:
    # Fire when used/capacity >= 85%.
    usageRatio: "0.85"
    # Fire when predicted time to full < 7 days.
    daysUntilFull: 7

  # Optional budget forecasting.
  budgets:
    namespaceBudgets:
      - namespace: "default"
        budget: "20Ti"
    workloadBudgets:
      - namespace: "default"
        kind: "StatefulSet"
        name: "postgres"
        budget: "8Ti"

  # How often to refresh LLM capacity planning insights per PVC.
  llmInsightsInterval: "6h"

  # LLM insight provider configuration.
  llm:
    # disabled | openai | anthropic | fastapi
    provider: "disabled"
    # Optional model identifier (provider-specific).
    model: ""
    # Request timeout and max output tokens.
    timeout: "15s"
    maxTokens: 256
    # When true, only alerting PVCs trigger LLM refreshes.
    onlyAlertingPVCs: false
    # Optional sampling temperature.
    # temperature: 0.2

    # OpenAI provider configuration.
    openai:
      # Secret in operator namespace with key `apiKey`.
      secretRefName: ""
      secretKey: "apiKey"
      # Optional custom endpoint for compatible gateways.
      baseURL: ""

    # Anthropic provider configuration.
    anthropic:
      secretRefName: ""
      secretKey: "apiKey"
      baseURL: ""

    # In-cluster FastAPI model service.
    fastapi:
      # Example: http://llm-api.ml.svc.cluster.local:8000/v1/insights
      url: ""
      # Optional health endpoint for degraded-mode checks.
      healthURL: ""
      # Optional bearer token secret.
      authSecretRefName: ""
      authSecretKey: "token"
      tlsSkipVerify: false
      # Enter degraded mode after this many consecutive failures.
      failureThreshold: 3
      # How long to stay degraded before retrying via health check.
      cooldown: "1m"

  # Namespace where the Grafana dashboard ConfigMap is created.
  # Defaults to "default" if not set.
  grafanaDashboardNamespace: "monitoring"
