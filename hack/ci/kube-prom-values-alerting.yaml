alertmanager:
  config:
    global: {}
    route:
      receiver: ci-webhook
      group_by:
        - alertname
      group_wait: 5s
      group_interval: 15s
      repeat_interval: 1h
      # Replace chart-default child routes (which reference receiver "null").
      # Without this, Helm map merge can keep default routes while receivers are
      # overridden, resulting in "undefined receiver \"null\" used in route".
      routes: []
    receivers:
      - name: ci-webhook
        webhook_configs:
          - url: http://alert-receiver.monitoring.svc.cluster.local:8080/
            send_resolved: true
