apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-steady
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Nightly steady pattern: linear writes over ~34m (~1640Mi total, ~80% of 2Gi).
          for i in $(seq 1 205); do
            dd if=/dev/zero of="/data/steady-${i}.bin" bs=1M count=8 >/dev/null 2>&1
            sync
            sleep 10
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-steady-pvc
