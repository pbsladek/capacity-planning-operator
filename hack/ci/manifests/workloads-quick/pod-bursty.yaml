apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-bursty
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Quick bursty profile: burst windows over ~15m (~640Mi total on 1Gi PVC).
          rand_sleep_500_4000() {
            raw="$(od -An -N2 -tu2 /dev/urandom 2>/dev/null | tr -d ' ')"
            if [ -z "${raw}" ]; then
              sleep 2
              return
            fi
            ms=$((500 + (raw % 3501)))
            secs="$(awk -v ms="${ms}" 'BEGIN { printf "%.3f", ms / 1000 }')"
            sleep "${secs}"
          }
          burst=0
          while [ "${burst}" -lt 40 ]; do
            burst=$((burst + 1))
            for i in $(seq 1 2); do
              dd if=/dev/zero of="/data/burst-${burst}-${i}.bin" bs=1M count=8 >/dev/null 2>&1
              sync
              rand_sleep_500_4000
            done
            sleep 18
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-bursty-pvc
