apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-steady
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Quick steady profile: linear growth over ~15m (~600Mi total on 1Gi PVC).
          for i in $(seq 1 150); do
            dd if=/dev/zero of="/data/steady-${i}.bin" bs=1M count=4 >/dev/null 2>&1
            sync
            sleep 6
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-steady-pvc
