apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-delayed
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Quick delayed profile: longer warm-up then sustained writes over ~11m (~640Mi total on 1Gi PVC).
          sleep 120
          for i in $(seq 1 80); do
            dd if=/dev/zero of="/data/delayed-${i}.bin" bs=1M count=8 >/dev/null 2>&1
            sync
            sleep 8
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-delayed-pvc
