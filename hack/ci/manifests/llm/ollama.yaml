apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
  labels:
    app.kubernetes.io/name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:0.6.2
        imagePullPolicy: IfNotPresent
        command: ["ollama", "serve"]
        ports:
        - containerPort: 11434
          name: http
        resources:
          requests:
            cpu: "1500m"
            memory: "4Gi"
          limits:
            cpu: "3500m"
            memory: "10Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
  labels:
    app.kubernetes.io/name: ollama
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
  - name: http
    port: 11434
    targetPort: http
