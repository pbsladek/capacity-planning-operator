apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-bursty
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Bursty growth: repeated bursts across a longer window (~288Mi total).
          burst=0
          while [ "${burst}" -lt 16 ]; do
            burst=$((burst + 1))
            for i in $(seq 1 3); do
              dd if=/dev/zero of="/data/burst-${burst}-${i}.bin" bs=1M count=6 >/dev/null 2>&1
              sync
              sleep 2
            done
            sleep 25
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-bursty-pvc
