apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-steady
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Steady linear growth: 1Mi every 8s for ~6m (~45Mi).
          for i in $(seq 1 45); do
            dd if=/dev/zero of="/data/steady-${i}.bin" bs=1M count=1 >/dev/null 2>&1
            sync
            sleep 8
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-steady-pvc
