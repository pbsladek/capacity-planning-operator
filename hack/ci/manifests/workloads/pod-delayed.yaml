apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-delayed
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Delayed growth: short idle warm-up then sustained writes (~48Mi).
          sleep 90
          for i in $(seq 1 24); do
            dd if=/dev/zero of="/data/delayed-${i}.bin" bs=1M count=2 >/dev/null 2>&1
            sync
            sleep 10
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-delayed-pvc
