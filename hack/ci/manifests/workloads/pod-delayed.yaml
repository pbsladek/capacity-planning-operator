apiVersion: v1
kind: Pod
metadata:
  name: cpo-ci-delayed
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          # Delayed growth: longer warm-up, then sustained writes over ~35m (~640Mi total).
          sleep 240
          for i in $(seq 1 160); do
            dd if=/dev/zero of="/data/delayed-${i}.bin" bs=1M count=4 >/dev/null 2>&1
            sync
            sleep 12
          done
          sleep 1800
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: cpo-ci-delayed-pvc
