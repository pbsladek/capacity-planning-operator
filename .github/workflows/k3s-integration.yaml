name: K3s Integration

on:
  workflow_dispatch:
    inputs:
      enable_llm:
        description: "Enable in-cluster Ollama-backed LLM insight checks"
        required: true
        type: boolean
        default: false
      llm_model:
        description: "Ollama model tag (recommended 7B/8B/9B profile)"
        required: true
        type: choice
        options:
          - "mistral:7b"
          - "llama3.1:8b"
          - "gemma2:9b"
        default: "mistral:7b"

permissions:
  contents: read

concurrency:
  group: k3s-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k3s-integration:
    name: K3s Integration (Prometheus + Alertmanager)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLUSTER_NAME: cpo-ci
      OPERATOR_IMAGE: capacity-planning-operator:ci
      ALERT_RECEIVER_IMAGE: capacity-alert-receiver:ci
      CI_RUNNER_BIN: /tmp/cpo-ci-runner
      EXTRA_IMAGES: busybox:1.36
      KUBE_PROM_VALUES_EXTRA_FILE: hack/ci/kube-prom-values-alerting.yaml
      ALERTMANAGER_EXPECTED_RECEIVER: ci-webhook
      ALERTMANAGER_EXPECTED_INTEGRATION: webhook
      K3D_VERSION: v5.7.5
      K3S_IMAGE: rancher/k3s:v1.32.2-k3s1
      KUBECTL_VERSION: v1.32.2
      HELM_VERSION: v3.16.4
      KUBE_PROM_STACK_CHART_VERSION: 65.8.1
      TREND_OBSERVE_SECONDS: "600"
      USAGE_SNAPSHOT_INTERVAL_SECONDS: "120"
      MIN_TREND_OBSERVE_SECONDS: "480"
      MIN_TREND_SNAPSHOTS: "4"
      MONITORING_ROLLOUT_TIMEOUT_SECONDS: "900"
      ALERT_PROPAGATION_TIMEOUT_SECONDS: "600"
      PLAN_SAMPLE_INTERVAL: 5s
      PLAN_RECONCILE_INTERVAL: 15s
      PLAN_SAMPLE_RETENTION: "256"
      CI_ENABLE_LLM: ${{ inputs.enable_llm && 'true' || 'false' }}
      CI_LLM_PROVIDER: ${{ inputs.enable_llm && 'ollama' || 'disabled' }}
      CI_LLM_MODEL: ${{ inputs.llm_model }}
      CI_LLM_TIMEOUT_SECONDS: "120"
      CI_LLM_SOFT_FAIL: "true"
      CI_LLM_TIMEOUT_HARD_FAIL: "true"
      CI_LLM_MODEL_PULL_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go toolchain
        run: go version

      - name: Print LLM Profile
        run: |
          echo "LLM profile configuration"
          echo "  enabled: ${CI_ENABLE_LLM}"
          echo "  provider: ${CI_LLM_PROVIDER}"
          echo "  model: ${CI_LLM_MODEL}"
          echo "  soft_fail: ${CI_LLM_SOFT_FAIL}"
          echo "  timeout_hard_fail: ${CI_LLM_TIMEOUT_HARD_FAIL}"
          echo "## LLM Profile" >> "${GITHUB_STEP_SUMMARY}"
          echo "- enabled: \`${CI_ENABLE_LLM}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- provider: \`${CI_LLM_PROVIDER}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- model: \`${CI_LLM_MODEL}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- soft-fail: \`${CI_LLM_SOFT_FAIL}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- timeout hard-fail: \`${CI_LLM_TIMEOUT_HARD_FAIL}\`" >> "${GITHUB_STEP_SUMMARY}"

      - name: Build CI runner binary
        run: |
          go build -o "${CI_RUNNER_BIN}" ./cmd/ci-runner
          chmod +x "${CI_RUNNER_BIN}"

      - name: Install kubectl (pinned)
        run: |
          mkdir -p "${HOME}/bin"
          curl -fsSL -o "${HOME}/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "${HOME}/bin/kubectl"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          kubectl version --client

      - name: Install Helm (pinned)
        run: |
          mkdir -p "${HOME}/bin"
          curl -fsSL -o /tmp/helm.tar.gz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/helm.tar.gz -C /tmp
          install -m 0755 /tmp/linux-amd64/helm "${HOME}/bin/helm"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          helm version --short

      - name: Install k3d (pinned)
        run: |
          mkdir -p "${HOME}/bin"
          curl -fsSL -o "${HOME}/bin/k3d" "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          chmod +x "${HOME}/bin/k3d"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          k3d version

      - name: Create k3s Cluster
        run: |
          k3d cluster create "${CLUSTER_NAME}" --agents 1 --image "${K3S_IMAGE}" --wait
          kubectl cluster-info

      - name: Build Operator Image
        run: docker build -t "${OPERATOR_IMAGE}" .

      - name: Build Alert Receiver Image
        run: docker build -f Dockerfile.alert-receiver -t "${ALERT_RECEIVER_IMAGE}" .

      - name: Import Image into k3s
        run: bash hack/ci/import_image_k3d.sh

      - name: Run K3s Integration Checks
        env:
          EXPECTED_KUBE_CONTEXT: k3d-${{ env.CLUSTER_NAME }}
        run: bash hack/ci/k3s_integration.sh

      - name: Upload Validation Report Artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: k3s-integration-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/cpo-ci-validation-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        continue-on-error: true
        run: bash hack/ci/collect_diagnostics.sh

      - name: List Diagnostic Files on Failure
        if: ${{ failure() }}
        continue-on-error: true
        run: |
          echo "Diagnostics tree under /tmp/cpo-ci-diagnostics"
          if [ -d /tmp/cpo-ci-diagnostics ]; then
            find /tmp/cpo-ci-diagnostics -maxdepth 4 -type f | sort
          else
            echo "diagnostics directory not found"
          fi

      - name: Upload Diagnostics Artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: k3s-integration-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/cpo-ci-diagnostics
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Combined Debug Artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: k3s-integration-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/cpo-ci-validation-report.json
            /tmp/cpo-ci-diagnostics
          if-no-files-found: warn
          retention-days: 14
